name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --group dev --all-packages

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy packages

      - name: Pytest
        run: uv run pytest
