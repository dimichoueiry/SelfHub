[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "selfhub-cli"
version = "0.1.0"
description = "SelfHub command line interface"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "SelfHub" }]
license = { text = "MIT" }
dependencies = [
    "rich>=13.9.0",
    "selfhub-core>=0.1.0",
    "typer>=0.12.0",
]

[project.scripts]
selfhub = "selfhub_cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/selfhub_cli"]
